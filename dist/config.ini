# LCSC to KiCad Importer - Configuration File
# You can edit these settings and restart the application.

[Settings]
hotkey = ctrl+shift+d
library_dir = C:\Users\LRNA\Desktop\Kicad-Design-Library
symbol_lib = EasyEDA
footprint_lib = EasyEDA

# --- Explanations ---
# hotkey: The keyboard shortcut to activate the background importer.
# library_dir: The absolute folder path where footprints, 3D models, and the symbol library will be saved.
# symbol_lib: The target library name to insert the symbol into (e.g. my symbol library is just named EasyEDA).
# footprint_lib: The target library name to insert the footprint into (e.g. my footpritn library is just EasyEDA).
